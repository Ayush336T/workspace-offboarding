name: Workspace Offboarding

on:
  schedule:
    # Runs daily at 11:00 AM IST (5:30 AM UTC)
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      test_user:
        description: "Single user email to test (leave empty to process all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run - don't delete accounts"
        required: false
        type: boolean
        default: false

jobs:
  offboard:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offboarding script
        env:
          GOOGLE_DOMAIN: ${{ secrets.GOOGLE_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          BACKUP_FOLDER_ID: ${{ secrets.BACKUP_FOLDER_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUSPENSION_THRESHOLD_DAYS: "45"
          DELETE_AFTER_BACKUP: ${{ github.event.inputs.dry_run == 'true' && 'false' || 'true' }}
          TEST_USER: ${{ github.event.inputs.test_user || '' }}
          SKIP_USERS: "arush.balyan@devrev.ai"
          BATCH_SIZE: "20"
          EXPORT_TIMEOUT_MINUTES: "300"
          MAX_RUN_MINUTES: "330"
        run: python main.py
