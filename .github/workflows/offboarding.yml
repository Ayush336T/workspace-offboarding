name: Workspace Offboarding

on:
  schedule:
    # Runs daily at 11:00 AM IST (5:30 AM UTC)
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      test_user:
        description: "Single user email to test (leave empty to process all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run - don't delete accounts"
        required: false
        type: boolean
        default: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      shards_b64: ${{ steps.plan.outputs.shards_b64 }}
      shard_indices: ${{ steps.plan.outputs.shard_indices }}
      has_work: ${{ steps.plan.outputs.has_work }}
      total_users: ${{ steps.plan.outputs.total_users }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover suspended users and build shards
        id: plan
        env:
          GOOGLE_DOMAIN: ${{ secrets.GOOGLE_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUSPENSION_THRESHOLD_DAYS: "45"
          SKIP_USERS: "arush.balyan@devrev.ai,devanshu.shah@devrev.ai,erik.jarlsson@devrev.ai,feng.gao@devrev.ai"
          BATCH_SIZE: "20"
          CHUNK_SIZE: "3"
          TEST_USER: ${{ github.event.inputs.test_user || '' }}
        run: python discover.py

  offboard:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard_index: ${{ fromJson(needs.discover.outputs.shard_indices) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode shard emails
        id: decode
        env:
          SHARDS_B64: ${{ needs.discover.outputs.shards_b64 }}
          SHARD_INDEX: ${{ matrix.shard_index }}
        run: |
          echo "shard_users=$(echo "$SHARDS_B64" | base64 --decode | python -c 'import json,os,sys; print(json.dumps(json.load(sys.stdin)[int(os.environ["SHARD_INDEX"])]))')" >> "$GITHUB_OUTPUT"

      - name: Run offboarding shard
        env:
          GOOGLE_DOMAIN: ${{ secrets.GOOGLE_DOMAIN }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          BACKUP_FOLDER_ID: ${{ secrets.BACKUP_FOLDER_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUSPENSION_THRESHOLD_DAYS: "45"
          DELETE_AFTER_BACKUP: ${{ github.event.inputs.dry_run == 'true' && 'false' || 'true' }}
          SKIP_USERS: "arush.balyan@devrev.ai,devanshu.shah@devrev.ai,erik.jarlsson@devrev.ai,feng.gao@devrev.ai"
          BATCH_SIZE: "0"
          EXPORT_TIMEOUT_MINUTES: "180"
          MAX_RUN_MINUTES: "300"
          SHARD_USERS: ${{ steps.decode.outputs.shard_users }}
        run: python main.py

  summarize:
    needs: [discover, offboard]
    if: always() && needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post run summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TOTAL_USERS: ${{ needs.discover.outputs.total_users }}
          OFFBOARD_RESULT: ${{ needs.offboard.result }}
        run: |
          if [ "$OFFBOARD_RESULT" = "success" ]; then
            EMOJI=":checkered_flag:"
            STATUS="all shards succeeded"
          else
            EMOJI=":warning:"
            STATUS="offboard result: $OFFBOARD_RESULT (some shards may have failed — check per-user messages above)"
          fi
          MSG="$EMOJI *Offboarding run complete* — $TOTAL_USERS user(s) attempted, $STATUS."
          curl -s -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": $(printf '%s' "$MSG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" \
            "$SLACK_WEBHOOK_URL"
